<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X文字数カウント | 便利ツール集</title>
  <meta name="description" content="X（旧Twitter）投稿の文字数をリアルタイムでカウント。140文字超過警告・改行数表示に対応。">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="便利ツール集">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="site-main">
    <div class="container">
      <div id="breadcrumb"></div>
      <article class="tool-page">
        <header class="tool-header">
          <h1 class="tool-title">X文字数カウント</h1>
          <p class="tool-description">投稿テキストの文字数をリアルタイムでカウント。140文字を超えると警告が表示されます。</p>
        </header>
        <div class="tool-panel">
          <div class="form-group">
            <label class="form-label" for="tweet-text">投稿テキスト</label>
            <textarea id="tweet-text" class="form-textarea" placeholder="ここにテキストを入力..." rows="6"></textarea>
            <div class="char-counter" id="char-counter">
              <span id="char-count">0 / 140文字</span>
            </div>
            <div class="char-stats">
              <span>文字数: <strong id="stat-chars">0</strong></span>
              <span>改行数: <strong id="stat-lines">0</strong></span>
            </div>
          </div>
          <div id="warning" class="result-box is-warning" hidden>
            <p class="result-value result-value--sm">140文字を超えています</p>
            <p class="result-sub" id="warning-detail"></p>
          </div>
        </div>
      </article>
    </div>
  </main>
  <div id="site-footer"></div>
    <script src="/js/config.js"></script>
  <script src="/js/categories.js"></script>
  <script src="/js/tools-registry.js"></script>
  <script src="/js/tools-content.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/tools/x-char-count.js"></script>
</body>
</html>
