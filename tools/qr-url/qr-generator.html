<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4500832628753006"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード生成 | 便利ツール集</title>
  <meta name="description" content="テキストやURLからQRコードを無料で生成。PNG形式でダウンロードできます。ブラウザ上で完結。">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="便利ツール集">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="site-main">
    <div class="container">
      <div id="breadcrumb"></div>
      <article class="tool-page">
        <header class="tool-header">
          <h1 class="tool-title">QRコード生成</h1>
          <p class="tool-description">テキストやURLを入力するとQRコードを生成します。PNG形式でダウンロード可能。</p>
        </header>
        <div class="tool-panel">
          <div class="form-group">
            <label class="form-label" for="qr-text">テキストまたはURL</label>
            <textarea id="qr-text" class="form-textarea" placeholder="https://example.com" rows="3"></textarea>
          </div>
          <button type="button" class="btn btn-primary btn-block" id="generate-btn">QRコードを生成</button>
          <div id="qr-output" class="qr-output" hidden>
            <div class="qr-canvas-wrap" id="qrcode"></div>
            <div class="qr-actions">
              <button type="button" class="btn btn-secondary" id="download-btn">PNGでダウンロード</button>
            </div>
          </div>
        </div>
      </article>
    </div>
  </main>
  <div id="site-footer"></div>
    <script src="/js/config.js"></script>
  <script src="/js/categories.js"></script>
  <script src="/js/tools-registry.js"></script>
  <script src="/js/tools-content.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/tools/qr-generator.js"></script>
</body>
</html>
