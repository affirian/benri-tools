<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4500832628753006"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>営業日計算 | 便利ツール集</title>
  <meta name="description" content="土日を除いた営業日数を計算する無料ツール。">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="便利ツール集">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="site-header"></div>
  <main class="site-main">
    <div class="container">
      <div id="breadcrumb"></div>
      <article class="tool-page">
        <header class="tool-header">
          <h1 class="tool-title">営業日計算</h1>
          <p class="tool-description">土日を除いた営業日数を計算する無料ツール。</p>
        </header>
        <div class="tool-panel">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="start-date">開始日</label>
              <input type="date" id="start-date" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label" for="end-date">終了日</label>
              <input type="date" id="end-date" class="form-input">
            </div>
          </div>
          <p class="form-hint">※土日のみ除外。祝日は含まれません。</p>
          <div id="result" class="result-box" hidden>
            <p class="result-label">営業日数</p>
            <p class="result-value" id="result-days">—</p>
            <p class="result-sub" id="result-total"></p>
          </div>
        </div>
      </article>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="/js/config.js"></script>
  <script src="/js/categories.js"></script>
  <script src="/js/tools-registry.js"></script>
  <script src="/js/tools-content.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/tools/business-days.js"></script>
</body>
</html>
