<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勤務時間計算 | 便利ツール集</title>
  <meta name="description" content="開始・終了時刻と休憩時間から実働時間を計算する無料ツール。残業時間の確認にも。">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="便利ツール集">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="site-main">
    <div class="container">
      <div id="breadcrumb"></div>
      <article class="tool-page">
        <header class="tool-header">
          <h1 class="tool-title">勤務時間計算</h1>
          <p class="tool-description">開始時刻・終了時刻・休憩時間を入力すると、実働時間を計算します。</p>
        </header>
        <div class="tool-panel">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="start-time">開始時刻</label>
              <input type="time" id="start-time" class="form-input" value="09:00">
            </div>
            <div class="form-group">
              <label class="form-label" for="end-time">終了時刻</label>
              <input type="time" id="end-time" class="form-input" value="18:00">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="break-minutes">休憩時間（分）</label>
            <input type="number" id="break-minutes" class="form-input" min="0" value="60">
            <p class="form-hint">昼休みなどの休憩時間を分単位で入力</p>
          </div>
          <div id="result" class="result-box" hidden>
            <p class="result-label">実働時間</p>
            <p class="result-value" id="result-hours">—</p>
            <p class="result-sub" id="result-detail"></p>
          </div>
        </div>
      </article>
    </div>
  </main>
  <div id="site-footer"></div>
    <script src="/js/config.js"></script>
  <script src="/js/categories.js"></script>
  <script src="/js/tools-registry.js"></script>
  <script src="/js/tools-content.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/tools/work-hours.js"></script>
</body>
</html>
