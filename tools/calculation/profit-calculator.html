<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4500832628753006"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利益率計算 | 便利ツール集</title>
  <meta name="description" content="原価と販売価格から利益額・利益率を計算する無料ツール。粗利率の算出に便利。">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="便利ツール集">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="site-main">
    <div class="container">
      <div id="breadcrumb"></div>
      <article class="tool-page">
        <header class="tool-header">
          <h1 class="tool-title">利益率計算</h1>
          <p class="tool-description">原価と販売価格を入力すると、利益額と利益率を計算します。</p>
        </header>
        <div class="tool-panel">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="cost">原価（円）</label>
              <input type="number" id="cost" class="form-input" min="0" placeholder="例：500">
            </div>
            <div class="form-group">
              <label class="form-label" for="price">販売価格（円）</label>
              <input type="number" id="price" class="form-input" min="0" placeholder="例：1000">
            </div>
          </div>
          <div id="result" class="result-box" hidden>
            <div class="result-grid">
              <div class="result-item">
                <p class="result-item-label">利益額</p>
                <p class="result-item-value" id="result-profit">—</p>
              </div>
              <div class="result-item">
                <p class="result-item-label">利益率（販売価格比）</p>
                <p class="result-item-value" id="result-margin">—</p>
              </div>
              <div class="result-item">
                <p class="result-item-label">利益率（原価比）</p>
                <p class="result-item-value" id="result-markup">—</p>
              </div>
            </div>
          </div>
        </div>
      </article>
    </div>
  </main>
  <div id="site-footer"></div>
    <script src="/js/config.js"></script>
  <script src="/js/categories.js"></script>
  <script src="/js/tools-registry.js"></script>
  <script src="/js/tools-content.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/tools/profit-calculator.js"></script>
</body>
</html>
