<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利息計算 | 便利ツール集</title>
  <meta name="description" content="元金・年利・年数から単利の利息を計算する無料ツール。満期合計額も表示。">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="便利ツール集">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="site-main">
    <div class="container">
      <div id="breadcrumb"></div>
      <article class="tool-page">
        <header class="tool-header">
          <h1 class="tool-title">利息計算（単利）</h1>
          <p class="tool-description">元金・年利・年数を入力すると、単利による利息と満期合計を計算します。</p>
        </header>
        <div class="tool-panel">
          <div class="form-group">
            <label class="form-label" for="principal">元金（円）</label>
            <input type="number" id="principal" class="form-input" min="0" placeholder="例：1000000">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="rate">年利（%）</label>
              <input type="number" id="rate" class="form-input" min="0" step="0.01" placeholder="例：1.5">
            </div>
            <div class="form-group">
              <label class="form-label" for="years">年数</label>
              <input type="number" id="years" class="form-input" min="0" step="0.1" placeholder="例：3">
            </div>
          </div>
          <div id="result" class="result-box" hidden>
            <div class="result-grid">
              <div class="result-item">
                <p class="result-item-label">利息（単利）</p>
                <p class="result-item-value" id="result-interest">—</p>
              </div>
              <div class="result-item">
                <p class="result-item-label">満期合計</p>
                <p class="result-item-value" id="result-total">—</p>
              </div>
            </div>
            <p class="result-sub" id="result-formula"></p>
          </div>
        </div>
      </article>
    </div>
  </main>
  <div id="site-footer"></div>
    <script src="/js/config.js"></script>
  <script src="/js/categories.js"></script>
  <script src="/js/tools-registry.js"></script>
  <script src="/js/tools-content.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/tools/interest-calculator.js"></script>
</body>
</html>
